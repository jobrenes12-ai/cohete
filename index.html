<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RocketCrash 3D Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background-color: #06090f;
            color: #ffffff;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* ESCENARIO ADAPTABLE CON PROFUNDIDAD */
        .game-canvas {
            position: relative;
            flex-grow: 1;
            background: radial-gradient(circle at 50% 45%, #0e172a 0%, #04060a 100%);
            overflow: hidden;
            border-bottom: 1px solid #16223f;
            width: 100%;
        }

        /* Cuadrícula neón con inclinación 3D fluida */
        .grid {
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background-image: 
                linear-gradient(rgba(0, 194, 255, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 194, 255, 0.08) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(300px) rotateX(60deg);
            animation: moveGrid 2s linear infinite;
            animation-play-state: paused;
        }

        @keyframes moveGrid {
            0% { transform: perspective(300px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(300px) rotateX(60deg) translateY(50px); }
        }

        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 1.5px, transparent 30px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 20px);
            background-size: 160px 160px, 110px 110px;
            background-position: 0 0, 40px 50px;
            opacity: 0.25;
        }

        /* CONTADOR GIGANTE NEÓN */
        .multiplier-container {
            position: absolute;
            top: 25%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
            width: 100%;
        }

        .multiplier {
            font-size: 14vw;
            max-size: 4.6rem;
            font-weight: 900;
            color: #ff9f43;
            text-shadow: 0 0 25px rgba(255, 159, 67, 0.6), 0 0 50px rgba(255, 159, 67, 0.3);
            font-variant-numeric: tabular-nums;
            letter-spacing: -1px;
        }

        .multiplier.crash {
            color: #ff4757;
            text-shadow: 0 0 25px rgba(255, 71, 87, 0.8);
        }

        .status-text {
            font-size: 3vw;
            color: #4b6584;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 5px;
        }

        /* ========================================================
           CONTENEDOR CON ROTACIÓN Y PERSPECTIVA REAL EN 3D 
           ======================================================== */
        .rocket-container {
            position: absolute;
            bottom: 15%;
            left: 15%;
            width: 90px;
            height: 90px;
            /* Aquí está el truco: inclinamos la nave en Y y X para el efecto 3D */
            transform: translate(-50%, 50%) rotate(-35deg) rotateY(-30deg) rotateX(20deg);
            transform-style: preserve-3d;
            display: none;
            z-index: 5;
            transition: left 0.05s linear, bottom 0.05s linear;
        }

        .jet-body {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
        }

        /* Fuselaje 3D con Sombras Cilíndricas Esféricas */
        .fuselage {
            position: absolute;
            top: 5px;
            left: 35px;
            width: 20px;
            height: 65px;
            /* Gradiente de triple capa para simular reflejo de metal curvado redondo */
            background: linear-gradient(90deg, #ffffff 0%, #bdc3c7 25%, #7f8c8d 60%, #2c3e50 100%);
            border-radius: 50% 50% 30% 30%;
            box-shadow: 5px 8px 15px rgba(0,0,0,0.5);
        }

        /* Cabina en Relieve 3D */
        .cockpit {
            position: absolute;
            top: 18px;
            left: 40px;
            width: 10px;
            height: 22px;
            background: linear-gradient(135deg, #00ecc6 0%, #00a8ff 100%);
            border-radius: 50% 50% 40% 40%;
            box-shadow: 0 0 12px rgba(0, 236, 198, 0.9), inset -2px -2px 5px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.4);
        }

        /* Alas Delta Doble Capa con Perspectiva de Alerón */
        .wings {
            position: absolute;
            top: 32px;
            left: 0px;
            width: 90px;
            height: 22px;
            background: linear-gradient(90deg, #ff2e44 0%, #ff4757 50%, #b31224 100%);
            border-radius: 4px;
            clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
            filter: drop-shadow(0 5px 4px rgba(0,0,0,0.4));
        }

        /* Alerones de cola verticales (Efecto 3D de profundidad) */
        .tail-fin {
            position: absolute;
            bottom: 5px;
            left: 42px;
            width: 6px;
            height: 18px;
            background: linear-gradient(90deg, #ffffff, #ff4757);
            border-radius: 50% 50% 0 0;
            transform: translateZ(15px); /* Eleva la aleta sobre el eje Z para despegarla del cuerpo */
        }

        .thruster {
            position: absolute;
            bottom: 0px;
            left: 39px;
            width: 12px;
            height: 8px;
            background: #1e272e;
            border-radius: 2px;
        }

        /* FUEGO DE PLASMA VOLUMÉTRICO HIPER-REALISTA */
        .plasma-flame {
            position: absolute;
            bottom: -38px;
            left: 36px;
            width: 18px;
            height: 42px;
            /* Degradado de fuego real con núcleo blanco incandescente */
            background: linear-gradient(180deg, #ffffff 0%, #fff176 25%, #ff9100 60%, #ff3d00 85%, transparent 100%);
            border-radius: 50% 50% 20% 20%;
            filter: drop-shadow(0 0 15px #ff6d00) blur(0.5px);
            animation: thrustPulse 0.05s linear infinite alternate;
            display: none;
        }

        @keyframes thrustPulse {
            0% { transform: scaleX(0.85) scaleY(0.9); opacity: 0.85; }
            100% { transform: scaleX(1.25) scaleY(1.15); opacity: 1; filter: drop-shadow(0 0 22px #ff3d00); }
        }

        /* Efecto de Explosión de Partículas */
        .explosion-effect {
            position: absolute;
            width: 110px;
            height: 110px;
            background: radial-gradient(circle, #ffffff 0%, #ffea00 25%, #ff3d00 60%, transparent 100%);
            border-radius: 50%;
            display: none;
            animation: explodePulse 0.25s ease-out;
            z-index: 6;
        }

        @keyframes explodePulse {
            0% { transform: scale(0.2); opacity: 1; filter: blur(0px); }
            50% { filter: blur(2px); }
            100% { transform: scale(1.4); opacity: 0; filter: blur(5px); }
        }

        /* PANEL DE CONTROLES INFERIOR */
        .controls-panel {
            background-color: #0b0f19;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-top: 1px solid #161f33;
            width: 100%;
        }

        .action-btn {
            width: 100%;
            max-width: 340px;
            height: 60px;
            border: none;
            border-radius: 14px;
            font-size: 1.2rem;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: all 0.1s ease;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
        }

        .btn-start {
            background: linear-gradient(135deg, #00cb82, #00734a);
            color: #fff;
            border: 1px solid #00ffaa;
        }

        .btn-cashout {
            background: linear-gradient(135deg, #ff9f43, #ff4757);
            color: #fff;
            border: 1px solid #ffbe76;
            animation: pulseBtn 0.8s infinite alternate;
        }

        @keyframes pulseBtn {
            0% { transform: scale(1); box-shadow: 0 0 15px rgba(255, 159, 67, 0.4); }
            100% { transform: scale(1.02); box-shadow: 0 0 25px rgba(255, 71, 87, 0.6); }
        }

        .btn-disabled {
            background: #171d29 !important;
            color: #4b5563 !important;
            cursor: not-allowed;
            animation: none;
            border: none;
            box-shadow: none;
        }
    </style>
</head>
<body>

    <div class="game-canvas">
        <div class="stars"></div>
        <div class="grid" id="grid"></div>
        
        <div class="multiplier-container">
            <div class="multiplier" id="multiplier_display">1.00x</div>
            <div class="status-text" id="game_status">ESPERANDO APUESTA</div>
        </div>

        <div class="rocket-container" id="rocket_container">
            <div class="jet-body">
                <div class="wings"></div>
                <div class="fuselage"></div>
                <div class="cockpit"></div>
                <div class="tail-fin"></div>
                <div class="thruster"></div>
            </div>
            <div class="plasma-flame" id="flame_element"></div>
            <div class="explosion-effect" id="explosion_element"></div>
        </div>
    </div>

    <div class="controls-panel">
        <button class="action-btn btn-start" id="main_btn">DESPEGAR ($1 USDT)</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const mainBtn = document.getElementById('main_btn');
        const multiplierDisplay = document.getElementById('multiplier_display');
        const gameStatus = document.getElementById('game_status');
        const rocketContainer = document.getElementById('rocket_container');
        const flameElement = document.getElementById('flame_element');
        const explosionElement = document.getElementById('explosion_element');
        const grid = document.getElementById('grid');

        let juegoLoop;
        let multiplicador = 1.00;
        let puntoCrashOculto = 1.00;
        let estadoJuego = "menu";

        function actualizarGraficosDespegue() {
            if (estadoJuego !== "volando") return;

            multiplicador += 0.03;
            multiplicador = parseFloat(multiplicador.toFixed(2));
            multiplierDisplay.innerText = multiplicador.toFixed(2) + "x";

            let progreso = (multiplicador - 1) * 16; 
            let posX = 15 + progreso;
            let posY = 15 + (Math.pow(progreso, 1.08));

            // Control estricto de órbita adaptable
            if (posX < 76) rocketContainer.style.left = posX + "%";
            if (posY < 66) rocketContainer.style.bottom = posY + "%";

            if (multiplicador >= puntoCrashOculto) {
                hacerCrash();
            }
        }

        function iniciarRondaGrafica() {
            estadoJuego = "volando";
            multiplicador = 1.00;
            puntoCrashOculto = parseFloat((Math.random() * (4.0 - 1.1) + 1.1).toFixed(2));

            gameStatus.innerText = "¡EN ÓRBITA!";
            multiplierDisplay.innerText = "1.00x";
            multiplierDisplay.classList.remove('crash');
            
            rocketContainer.style.display = "block";
            flameElement.style.display = "block";
            explosionElement.style.display = "none";
            document.querySelector('.jet-body').style.display = "block";
            
            rocketContainer.style.left = "15%";
            rocketContainer.style.bottom = "15%";
            grid.style.animationPlayState = "running";

            mainBtn.innerText = "CASHOUT";
            mainBtn.className = "action-btn btn-cashout";

            juegoLoop = setInterval(actualizarGraficosDespegue, 45); 
        }

        function hacerCashout() {
            clearInterval(juegoLoop);
            estadoJuego = "retirado";
            grid.style.animationPlayState = "paused";
            flameElement.style.display = "none";

            gameStatus.innerText = "¡EXTRACCIÓN EXITOSA!";
            mainBtn.innerText = "GANASTE +$" + multiplicador + " USDT";
            mainBtn.className = "action-btn btn-disabled";

            setTimeout(() => {
                tg.close();
            }, 1400);
        }

        function hacerCrash() {
            clearInterval(juegoLoop);
            estadoJuego = "crash";
            grid.style.animationPlayState = "paused";
            
            flameElement.style.display = "none";
            document.querySelector('.jet-body').style.display = "none";
            explosionElement.style.display = "block";
            multiplierDisplay.classList.add('crash');

            gameStatus.innerText = "💥 CRASH";
            mainBtn.innerText = "PERDISTE";
            mainBtn.className = "action-btn btn-disabled";

            setTimeout(() => {
                tg.close();
            }, 1600);
        }

        mainBtn.addEventListener('click', () => {
            if (estadoJuego === "menu") {
                iniciarRondaGrafica();
            } else if (estadoJuego === "volando") {
                hacerCashout();
            }
        });
    </script>
</body>
</html>
