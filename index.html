<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RocketCrash Game</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background-color: #0b0e14;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ESCENARIO DEL JUEGO (ESPACIO) */
        .game-canvas {
            position: relative;
            flex-grow: 1;
            background: radial-gradient(circle at center, #1a1f2c 0%, #0b0e14 100%);
            overflow: hidden;
            border-bottom: 2px solid #1f2633;
        }

        /* Cuadrícula de fondo estilo arcade neón */
        .grid {
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background-image: 
                linear-gradient(rgba(31, 38, 51, 0.3) 1px, transparent 1px),
                linear-gradient(90deg, rgba(31, 38, 51, 0.3) 1px, transparent 1px);
            background-size: 40px 40px;
            transform: perspective(500px) rotateX(60deg);
            animation: moveGrid 4s linear infinite;
            animation-play-state: paused;
        }

        @keyframes moveGrid {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(40px); }
        }

        /* CONTADOR GIGANTE NEÓN */
        .multiplier-container {
            position: absolute;
            top: 25%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
        }

        .multiplier {
            font-size: 4rem;
            font-weight: 800;
            color: #ff9f43;
            text-shadow: 0 0 20px rgba(255, 159, 67, 0.6), 0 0 40px rgba(255, 159, 67, 0.3);
            font-variant-numeric: tabular-nums;
            transition: color 0.1s;
        }

        .multiplier.crash {
            color: #ff4757;
            text-shadow: 0 0 20px rgba(255, 71, 87, 0.6);
        }

        /* EL COHETE Y SU ANIMACIÓN */
        .rocket-container {
            position: absolute;
            bottom: 15%;
            left: 15%;
            width: 70px;
            height: 70px;
            transform: translate(-50%, 50%) rotate(45deg);
            display: none;
            z-index: 5;
        }

        .rocket {
            width: 100%;
            height: 100%;
            font-size: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Fuego del propulsor */
        .rocket::after {
            content: '🔥';
            position: absolute;
            font-size: 25px;
            bottom: -15px;
            left: calc(50% - 12px);
            transform: rotate(135deg);
            animation: flame 0.1s linear infinite alternate;
            display: none;
        }

        @keyframes flame {
            0% { transform: rotate(135deg) scale(0.9); opacity: 0.8; }
            100% { transform: rotate(135deg) scale(1.2); opacity: 1; }
        }

        /* SECCIÓN DE CONTROLES (BOTÓN INFERIOR) */
        .controls-panel {
            background-color: #131924;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
            justify-content: center;
        }

        .action-btn {
            width: 100%;
            max-width: 320px;
            height: 60px;
            border: none;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s ease;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
        }

        .btn-start {
            background: linear-gradient(135deg, #2ed573, #1dd1a1);
            color: #fff;
        }

        .btn-cashout {
            background: linear-gradient(135deg, #ff9f43, #ff6b6b);
            color: #fff;
            box-shadow: 0 0 15px rgba(255, 159, 67, 0.4);
            animation: pulseBtn 1s infinite alternate;
        }

        @keyframes pulseBtn {
            0% { transform: scale(1); }
            100% { transform: scale(1.03); }
        }

        .btn-disabled {
            background: #2c3545 !important;
            color: #576574 !important;
            cursor: not-allowed;
            box-shadow: none;
            animation: none;
        }

        .status-text {
            font-size: 0.9rem;
            color: #8492a6;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="game-canvas">
        <div class="grid" id="grid"></div>
        
        <div class="multiplier-container">
            <div class="multiplier" id="multiplier_display">1.00x</div>
            <div class="status-text" id="game_status">ESPERANDO APUESTA</div>
        </div>

        <div class="rocket-container" id="rocket_container">
            <div class="rocket" id="rocket_element">🚀</div>
        </div>
    </div>

    <div class="controls-panel">
        <button class="action-btn btn-start" id="main_btn">DESPEGAR ($1 USDT)</button>
    </div>

    <script>
        // Inicializamos la Mini App de Telegram
        const tg = window.Telegram.WebApp;
        tg.expand(); // Expande la app a pantalla completa en el celular

        // Elementos de la interfaz gráfica
        const mainBtn = document.getElementById('main_btn');
        const multiplierDisplay = document.getElementById('multiplier_display');
        const gameStatus = document.getElementById('game_status');
        const rocketContainer = document.getElementById('rocket_container');
        const grid = document.getElementById('grid');

        let juegoLoop;
        let multiplicador = 1.00;
        let puntoCrashOculto = 1.00;
        let estadoJuego = "menu"; // menu, volando, crash, retirado

        // Función que hace subir el cohete de verdad por la pantalla
        function actualizarGraficosDespegue() {
            if (estadoJuego !== "volando") return;

            multiplicador += 0.04; // Sube fluido cada milisegundo
            multiplicador = parseFloat(multiplicador.toFixed(2));
            multiplierDisplay.innerText = multiplicador.toFixed(2) + "x";

            // Animación del cohete moviéndose en diagonal en la pantalla
            let progreso = (multiplicador - 1) * 15; 
            let posX = 15 + progreso;
            let posY = 15 + (progreso * 1.2);

            // Evitamos que el cohete se salga de los bordes del celular
            if (posX < 75) rocketContainer.style.left = posX + "%";
            if (posY < 75) rocketContainer.style.bottom = posY + "%";

            // SI ALCANZA EL CRASH MATEMÁTICO: EXPLOTA
            if (multiplicador >= puntoCrashOculto) {
                hacerCrash();
            }
        }

        function iniciarRondaGrafica() {
            estadoJuego = "volando";
            multiplicador = 1.00;
            
            // Generamos el punto de quiebre (luego se conectará con tu backend)
            puntoCrashOculto = parseFloat((Math.random() * (4.5 - 1.1) + 1.1).toFixed(2));

            // Configuración visual activa
            gameStatus.innerText = "¡EL COHETE VA EN ÓRBITA!";
            multiplierDisplay.classList.remove('crash');
            
            // Aparece el cohete y se mueve la cuadrícula neón
            rocketContainer.style.display = "block";
            rocketContainer.style.left = "15%";
            rocketContainer.style.bottom = "15%";
            document.styleSheets[0].addRule('.rocket::after', 'display: block !important');
            grid.style.animationPlayState = "running";

            // Cambiamos el botón al modo CASHOUT adictivo
            mainBtn.innerText = "CASHOUT";
            mainBtn.className = "action-btn btn-cashout";

            // Arrancamos el reloj de actualización ultrarrápido (cada 50ms)
            juegoLoop = setInterval(actualizarGraficosDespegue, 50);
        }

        function hacerCashout() {
            clearInterval(juegoLoop);
            estadoJuego = "retirado";
            grid.style.animationPlayState = "paused";
            document.styleSheets[0].addRule('.rocket::after', 'display: none !important');

            gameStatus.innerText = "¡EXTRACCIÓN EXITOSA!";
            mainBtn.innerText = "GANASTE +$" + multiplicador + " USDT";
            mainBtn.className = "action-btn btn-disabled";

            // Mandamos los datos de la ganancia directo al chat de Telegram del usuario
            setTimeout(() => {
                tg.sendData(JSON.stringify({
                    accion: "cashout",
                    multiplicador: multiplicador
                }));
                resetearAlMenu();
            }, 1800);
        }

        function hacerCrash() {
            clearInterval(juegoLoop);
            estadoJuego = "crash";
            grid.style.animationPlayState = "paused";
            
            // El cohete cambia a emoji de explosión
            document.getElementById('rocket_element').innerText = "💥";
            document.styleSheets[0].addRule('.rocket::after', 'display: none !important');
            multiplierDisplay.classList.add('crash');

            gameStatus.innerText = "💥 ¡C R A S H!";
            mainBtn.innerText = "PERDISTE LA APUESTA";
            mainBtn.className = "action-btn btn-disabled";

            setTimeout(() => {
                tg.sendData(JSON.stringify({
                    accion: "crash",
                    multiplicador: puntoCrashOculto
                }));
                resetearAlMenu();
            }, 2000);
        }

        function resetearAlMenu() {
            estadoJuego = "menu";
            document.getElementById('rocket_element').innerText = "🚀";
            rocketContainer.style.display = "none";
            multiplierDisplay.innerText = "1.00x";
            multiplierDisplay.classList.remove('crash');
            gameStatus.innerText = "PREPARADO PARA EL DESPEGUE";
            mainBtn.innerText = "DESPEGAR ($1 USDT)";
            mainBtn.className = "action-btn btn-start";
        }

        // Manejador del toque del dedo en el botón único
        mainBtn.addEventListener('click', () => {
            if (estadoJuego === "menu") {
                iniciarRondaGrafica();
            } else if (estadoJuego === "volando") {
                hacerCashout();
            }
        });
    </script>
</body>
</html>
