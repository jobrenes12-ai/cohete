<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RocketCrash Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background-color: #06090f;
            color: #ffffff;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ESCENARIO PREMIUM CON DEGRADADO PROFUNDO */
        .game-canvas {
            position: relative;
            flex-grow: 1;
            background: radial-gradient(circle at 50% 40%, #111726 0%, #06090f 100%);
            overflow: hidden;
            border-bottom: 1px solid #172237;
        }

        /* Cuadrícula neón con perspectiva de movimiento real en 3D */
        .grid {
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background-image: 
                linear-gradient(rgba(0, 194, 255, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 194, 255, 0.08) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(600px) rotateX(45deg);
            animation: moveGrid 3s linear infinite;
            animation-play-state: paused;
        }

        @keyframes moveGrid {
            0% { transform: perspective(600px) rotateX(45deg) translateY(0); }
            100% { transform: perspective(600px) rotateX(45deg) translateY(50px); }
        }

        /* PARTÍCULAS DE ESTRELLAS PARPADEANTES */
        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px);
            background-size: 200px 200px, 150px 150px;
            background-position: 0 0, 40px 60px;
            opacity: 0.3;
        }

        /* CONTADOR GIGANTE DIGITAL */
        .multiplier-container {
            position: absolute;
            top: 25%;
            left: 50 Img;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
            width: 100%;
        }

        .multiplier {
            font-size: 4.8rem;
            font-weight: 900;
            color: #ff9f43;
            text-shadow: 0 0 25px rgba(255, 159, 67, 0.5), 0 0 50px rgba(255, 159, 67, 0.2);
            font-variant-numeric: tabular-nums;
            letter-spacing: -1px;
        }

        .multiplier.crash {
            color: #ff4757;
            text-shadow: 0 0 25px rgba(255, 71, 87, 0.6);
            animation: shake 0.3s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-8px); }
            40%, 80% { transform: translateX(8px); }
        }

        .status-text {
            font-size: 0.85rem;
            color: #4b6584;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 5px;
        }

        /* CONTENEDOR DEL COHETE ESTILIZADO */
        .rocket-container {
            position: absolute;
            bottom: 15%;
            left: 15%;
            width: 75px;
            height: 75px;
            transform: translate(-50%, 50%) rotate(45deg);
            display: none;
            z-index: 5;
            transition: left 0.05s linear, bottom 0.05s linear;
        }

        .rocket {
            width: 100%;
            height: 100%;
            font-size: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            filter: drop-shadow(0 0 15px rgba(255, 159, 67, 0.4));
        }

        /* Propulsor de partículas de fuego */
        .rocket::after {
            content: '';
            position: absolute;
            width: 12px;
            height: 35px;
            background: linear-gradient(to top, transparent, #ff4757, #ff9f43, #ffffff);
            border-radius: 50%;
            bottom: -30px;
            left: calc(50% - 6px);
            transform: rotate(180deg);
            box-shadow: 0 0 20px #ff9f43;
            animation: flameWobble 0.08s linear infinite alternate;
            display: none;
        }

        @keyframes flameWobble {
            0% { transform: rotate(180deg) scaleX(0.8) translateY(0); }
            100% { transform: rotate(180deg) scaleX(1.2) translateY(-3px); }
        }

        /* PANEL DE CONTROLES INFERIOR ESTILO CASINO */
        .controls-panel {
            background-color: #0d131f;
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-top: 1px solid #1c273c;
        }

        .action-btn {
            width: 100%;
            max-width: 340px;
            height: 64px;
            border: none;
            border-radius: 16px;
            font-size: 1.25rem;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: all 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        }

        .btn-start {
            background: linear-gradient(135deg, #00cb82, #00734a);
            color: #fff;
            border: 1px solid #00ffaa;
        }
        .btn-start:active { transform: scale(0.97); }

        .btn-cashout {
            background: linear-gradient(135deg, #ff9f43, #ff4757);
            color: #fff;
            border: 1px solid #ffbe76;
            box-shadow: 0 0 25px rgba(255, 159, 67, 0.4);
            animation: pulseBtn 0.8s infinite alternate;
        }

        @keyframes pulseBtn {
            0% { transform: scale(1); box-shadow: 0 0 20px rgba(255, 159, 67, 0.4); }
            100% { transform: scale(1.02); box-shadow: 0 0 30px rgba(255, 71, 87, 0.6); }
        }

        .btn-disabled {
            background: #1c2331 !important;
            color: #4b5563 !important;
            cursor: not-allowed;
            box-shadow: none;
            animation: none;
            border: none;
        }
    </style>
</head>
<body>

    <div class="game-canvas">
        <div class="stars"></div>
        <div class="grid" id="grid"></div>
        
        <div class="multiplier-container">
            <div class="multiplier" id="multiplier_display">1.00x</div>
            <div class="status-text" id="game_status">ESPERANDO APUESTA</div>
        </div>

        <div class="rocket-container" id="rocket_container">
            <div class="rocket" id="rocket_element">🚀</div>
        </div>
    </div>

    <div class="controls-panel">
        <button class="action-btn btn-start" id="main_btn">DESPEGAR ($1 USDT)</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const mainBtn = document.getElementById('main_btn');
        const multiplierDisplay = document.getElementById('multiplier_display');
        const gameStatus = document.getElementById('game_status');
        const rocketContainer = document.getElementById('rocket_container');
        const grid = document.getElementById('grid');

        let juegoLoop;
        let multiplicador = 1.00;
        let puntoCrashOculto = 1.00;
        let estadoJuego = "menu";

        function actualizarGraficosDespegue() {
            if (estadoJuego !== "volando") return;

            // Incremento fluido para suavizar la animación
            multiplicador += 0.03;
            multiplicador = parseFloat(multiplicador.toFixed(2));
            multiplierDisplay.innerText = multiplicador.toFixed(2) + "x";

            // Cálculo parabólico suave para el vuelo en diagonal
            let progreso = (multiplicador - 1) * 18; 
            let posX = 15 + progreso;
            let posY = 15 + (Math.pow(progreso, 1.1));

            if (posX < 75) rocketContainer.style.left = posX + "%";
            if (posY < 70) rocketContainer.style.bottom = posY + "%";

            if (multiplicador >= puntoCrashOculto) {
                hacerCrash();
            }
        }

        function iniciarRondaGrafica() {
            estadoJuego = "volando";
            multiplicador = 1.00;
            
            // Margen aleatorio de quiebre
            puntoCrashOculto = parseFloat((Math.random() * (4.2 - 1.1) + 1.1).toFixed(2));

            gameStatus.innerText = "¡EN ORBITA!";
            multiplierDisplay.classList.remove('crash');
            
            rocketContainer.style.display = "block";
            rocketContainer.style.left = "15%";
            rocketContainer.style.bottom = "15%";
            document.styleSheets[0].addRule('.rocket::after', 'display: block !important');
            grid.style.animationPlayState = "running";

            mainBtn.innerText = "CASHOUT";
            mainBtn.className = "action-btn btn-cashout";

            juegoLoop = setInterval(actualizarGraficosDespegue, 45); // Más rápido y fluido
        }

        function hacerCashout() {
            clearInterval(juegoLoop);
            estadoJuego = "retirado";
            grid.style.animationPlayState = "paused";
            document.styleSheets[0].addRule('.rocket::after', 'display: none !important');

            gameStatus.innerText = "¡EXTRACCIÓN EXITOSA!";
            mainBtn.innerText = "GANASTE +$" + multiplicador + " USDT";
            mainBtn.className = "action-btn btn-disabled";

            setTimeout(() => {
                tg.close();
            }, 1400);
        }

        function hacerCrash() {
            clearInterval(juegoLoop);
            estadoJuego = "crash";
            grid.style.animationPlayState = "paused";
            
            document.getElementById('rocket_element').innerText = "💥";
            document.styleSheets[0].addRule('.rocket::after', 'display: none !important');
            multiplierDisplay.classList.add('crash');

            gameStatus.innerText = "💥 CRASH";
            mainBtn.innerText = "PERDISTE";
            mainBtn.className = "action-btn btn-disabled";

            setTimeout(() => {
                tg.close();
            }, 1600);
        }

        mainBtn.addEventListener('click', () => {
            if (estadoJuego === "menu") {
                iniciarRondaGrafica();
            } else if (estadoJuego === "volando") {
                hacerCashout();
            }
        });
    </script>
</body>
</html>
