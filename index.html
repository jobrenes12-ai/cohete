<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RocketCrash Fix</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background-color: #06090f;
            color: #ffffff;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding-top: env(safe-area-inset-top); /* Soporte para 'notches' */
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* ESCENARIO ADAPTABLE */
        .game-canvas {
            position: relative;
            flex-grow: 1;
            background: radial-gradient(circle at 50% 40%, #111726 0%, #06090f 100%);
            overflow: hidden;
            border-bottom: 1px solid #172237;
            /* Aseguramos que el área de juego principal tenga márgenes */
            width: 95%;
            margin: 0 auto; 
            border-radius: 12px;
        }

        .grid {
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background-image: 
                linear-gradient(rgba(0, 194, 255, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 194, 255, 0.08) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(600px) rotateX(45deg);
            animation: moveGrid 3s linear infinite;
            animation-play-state: paused;
        }

        @keyframes moveGrid {
            0% { transform: perspective(600px) rotateX(45deg) translateY(0); }
            100% { transform: perspective(600px) rotateX(45deg) translateY(50px); }
        }

        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px);
            background-size: 200px 200px, 150px 150px;
            background-position: 0 0, 40px 60px;
            opacity: 0.3;
        }

        /* CONTADOR GIGANTE ADAPTABLE */
        .multiplier-container {
            position: absolute;
            top: 25%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
            width: 90%; /* Ajustado para márgenes laterales */
        }

        .multiplier {
            font-size: 14vw; /* Escala dinámicamente con el ancho de pantalla */
            max-size: 4.8rem;
            font-weight: 900;
            color: #ff9f43;
            text-shadow: 0 0 25px rgba(255, 159, 67, 0.5), 0 0 50px rgba(255, 159, 67, 0.2);
            font-variant-numeric: tabular-nums;
            letter-spacing: -1px;
        }

        .status-text {
            font-size: 3vw;
            max-size: 0.85rem;
            color: #4b6584;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 5px;
        }

        /* CONTENEDOR DEL COHETE ESTILIZADO (Márgenes de seguridad) */
        .rocket-container {
            position: absolute;
            bottom: 15%;
            left: 15%;
            width: 60px; /* Reducido un poco para evitar que se corte */
            height: 60px;
            transform: translate(-50%, 50%) rotate(45deg);
            display: none;
            z-index: 5;
            transition: left 0.05s linear, bottom 0.05s linear;
        }

        .rocket {
            width: 100%;
            height: 100%;
            font-size: 40px; /* Tamaño adaptable */
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            filter: drop-shadow(0 0 15px rgba(255, 159, 67, 0.4));
        }

        /* PANEL DE CONTROLES INFERIOR (Ocupa todo el ancho) */
        .controls-panel {
            background-color: #0d131f;
            padding: 16px; /* Reducido para ahorrar espacio vertical */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-top: 1px solid #1c273c;
            width: 100%;
        }

        .action-btn {
            width: 100%;
            height: 56px; /* Altura adaptable */
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .btn-start {
            background: linear-gradient(135deg, #00cb82, #00734a);
            color: #fff;
            border: 1px solid #00ffaa;
        }

        .btn-cashout {
            background: linear-gradient(135deg, #ff9f43, #ff4757);
            color: #fff;
            border: 1px solid #ffbe76;
            animation: pulseBtn 0.8s infinite alternate;
        }

        @keyframes pulseBtn {
            0% { transform: scale(1); box-shadow: 0 0 20px rgba(255, 159, 67, 0.4); }
            100% { transform: scale(1.02); box-shadow: 0 0 30px rgba(255, 71, 87, 0.6); }
        }

        .btn-disabled {
            background: #1c2331 !important;
            color: #4b5563 !important;
            cursor: not-allowed;
            animation: none;
            border: none;
        }
    </style>
</head>
<body>

    <div class="game-canvas">
        <div class="stars"></div>
        <div class="grid" id="grid"></div>
        
        <div class="multiplier-container">
            <div class="multiplier" id="multiplier_display">1.00x</div>
            <div class="status-text" id="game_status">ESPERANDO APUESTA</div>
        </div>

        <div class="rocket-container" id="rocket_container">
            <div class="rocket" id="rocket_element">🚀</div>
        </div>
    </div>

    <div class="controls-panel">
        <button class="action-btn btn-start" id="main_btn">DESPEGAR ($1 USDT)</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const mainBtn = document.getElementById('main_btn');
        const multiplierDisplay = document.getElementById('multiplier_display');
        const gameStatus = document.getElementById('game_status');
        const rocketContainer = document.getElementById('rocket_container');
        const grid = document.getElementById('grid');

        let juegoLoop;
        let multiplicador = 1.00;
        let puntoCrashOculto = 1.00;
        let estadoJuego = "menu";

        function actualizarGraficosDespegue() {
            if (estadoJuego !== "volando") return;

            multiplicador += 0.03;
            multiplicador = parseFloat(multiplicador.toFixed(2));
            multiplierDisplay.innerText = multiplicador.toFixed(2) + "x";

            let progreso = (multiplicador - 1) * 18; 
            let posX = 15 + progreso;
            let posY = 15 + (Math.pow(progreso, 1.1));

            // Márgenes de seguridad más estrictos para que no toque los bordes
            if (posX < 80) rocketContainer.style.left = posX + "%";
            if (posY < 75) rocketContainer.style.bottom = posY + "%";

            if (multiplicador >= puntoCrashOculto) {
                hacerCrash();
            }
        }

        function iniciarRondaGrafica() {
            estadoJuego = "volando";
            multiplicador = 1.00;
            puntoCrashOculto = parseFloat((Math.random() * (4.2 - 1.1) + 1.1).toFixed(2));

            gameStatus.innerText = "¡EN ORBITA!";
            multiplierDisplay.innerText = "1.00x";
            
            rocketContainer.style.display = "block";
            rocketContainer.style.left = "15%";
            rocketContainer.style.bottom = "15%";
            grid.style.animationPlayState = "running";

            mainBtn.innerText = "CASHOUT";
            mainBtn.className = "action-btn btn-cashout";

            juegoLoop = setInterval(actualizarGraficosDespegue, 45); 
        }

        function hacerCashout() {
            clearInterval(juegoLoop);
            estadoJuego = "retirado";
            grid.style.animationPlayState = "paused";

            gameStatus.innerText = "¡EXTRACCIÓN EXITOSA!";
            mainBtn.innerText = "GANASTE +$" + multiplicador + " USDT";
            mainBtn.className = "action-btn btn-disabled";

            setTimeout(() => {
                tg.close();
            }, 1400);
        }

        function hacerCrash() {
            clearInterval(juegoLoop);
            estadoJuego = "crash";
            grid.style.animationPlayState = "paused";
            
            document.getElementById('rocket_element').innerText = "💥";
            multiplierDisplay.style.color = '#ff4757';

            gameStatus.innerText = "💥 CRASH";
            mainBtn.innerText = "PERDISTE";
            mainBtn.className = "action-btn btn-disabled";

            setTimeout(() => {
                tg.close();
            }, 1600);
        }

        mainBtn.addEventListener('click', () => {
            if (estadoJuego === "menu") {
                iniciarRondaGrafica();
            } else if (estadoJuego === "volando") {
                hacerCashout();
            }
        });
    </script>
</body>
</html>
