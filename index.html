<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RocketCrash Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background-color: #06090f;
            color: #ffffff;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* ESCENARIO ADAPTABLE COMPLETO */
        .game-canvas {
            position: relative;
            flex-grow: 1;
            background: radial-gradient(circle at 50% 40%, #0a1120 0%, #04060a 100%);
            overflow: hidden;
            border-bottom: 1px solid #121a2e;
            width: 100%;
        }

        /* Cuadrícula neón con perspectiva cibernética */
        .grid {
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background-image: 
                linear-gradient(rgba(0, 194, 255, 0.06) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 194, 255, 0.06) 1px, transparent 1px);
            background-size: 40px 40px;
            transform: perspective(400px) rotateX(50deg);
            animation: moveGrid 2.5s linear infinite;
            animation-play-state: paused;
        }

        @keyframes moveGrid {
            0% { transform: perspective(400px) rotateX(50deg) translateY(0); }
            100% { transform: perspective(400px) rotateX(50deg) translateY(40px); }
        }

        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 1.5px, transparent 30px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 20px);
            background-size: 140px 140px, 100px 100px;
            background-position: 0 0, 30px 40px;
            opacity: 0.25;
        }

        /* CONTADOR GIGANTE ADAPTABLE */
        .multiplier-container {
            position: absolute;
            top: 25%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
            width: 100%;
        }

        .multiplier {
            font-size: 15vw;
            max-size: 4.5rem;
            font-weight: 900;
            color: #ff9f43;
            text-shadow: 0 0 20px rgba(255, 159, 67, 0.5), 0 0 40px rgba(255, 159, 67, 0.2);
            font-variant-numeric: tabular-nums;
            letter-spacing: -1px;
        }

        .multiplier.crash {
            color: #ff4757;
            text-shadow: 0 0 25px rgba(255, 71, 87, 0.7);
        }

        .status-text {
            font-size: 3vw;
            color: #4b6584;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 5px;
        }

        /* ========================================================
           DISEÑO DE LA NAVE ULTRA-PROFESIONAL EN CSS (VECTORES)
           ======================================================== */
        .rocket-container {
            position: absolute;
            bottom: 15%;
            left: 15%;
            width: 80px;
            height: 80px;
            transform: translate(-50%, 50%) rotate(-45deg); /* Inversión de ángulo para simular 3D diagonal */
            display: none;
            z-index: 5;
            transition: left 0.05s linear, bottom 0.05s linear;
        }

        /* Cuerpo del Jet Supersónico */
        .jet-body {
            position: relative;
            width: 100%;
            height: 100%;
        }

        /* Fuselaje Central Metálico */
        .fuselage {
            position: absolute;
            top: 10px;
            left: 32px;
            width: 16px;
            height: 60px;
            background: linear-gradient(90deg, #d2dae2, #718093, #485460);
            border-radius: 50% 50% 20% 20%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* Cabina de Cristal Tintada */
        .cockpit {
            position: absolute;
            top: 22px;
            left: 36px;
            width: 8px;
            height: 18px;
            background: linear-gradient(135deg, #00d2d3, #00a8ff);
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(0, 210, 211, 0.8);
        }

        /* Alas Delta de Alta Velocidad */
        .wings {
            position: absolute;
            top: 35px;
            left: 5px;
            width: 70px;
            height: 18px;
            background: linear-gradient(90deg, #ff4757, #ee5253, #ff4757);
            border-radius: 6px 6px 2px 2px;
            clip-path: polygon(50% 0%, 100% 100%, 0% 100%); /* Forma de triángulo agresivo */
        }

        /* Turbina del Motor Trasero */
        .thruster {
            position: absolute;
            bottom: 6px;
            left: 35px;
            width: 10px;
            height: 8px;
            background: #2f3640;
            border-radius: 2px;
        }

        /* FUEGO DE PLASMA ADICTIVO DE LA TURBINA */
        .plasma-flame {
            position: absolute;
            bottom: -32px;
            left: 33px;
            width: 14px;
            height: 35px;
            background: linear-gradient(180deg, #ffffff, #ffca28, #ff3d00, transparent);
            border-radius: 50%;
            filter: drop-shadow(0 0 10px #ff6d00);
            animation: thrustPulse 0.06s linear infinite alternate;
            display: none;
        }

        @keyframes thrustPulse {
            0% { transform: scaleX(0.8) translateY(0); opacity: 0.9; }
            100% { transform: scaleX(1.2) translateY(4px); opacity: 1; }
        }

        /* Efecto de Explosión real */
        .explosion-effect {
            position: absolute;
            width: 90px;
            height: 90px;
            background: radial-gradient(circle, #ffffff 0%, #ffca28 30%, #ff3d00 70%, transparent 100%);
            border-radius: 50%;
            display: none;
            animation: explodePulse 0.2s ease-out;
        }

        @keyframes explodePulse {
            0% { transform: scale(0.3); opacity: 1; }
            100% { transform: scale(1.3); opacity: 0; }
        }

        /* PANEL DE CONTROLES PREMIUM */
        .controls-panel {
            background-color: #0b0f19;
            padding: 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-top: 1px solid #161f33;
            width: 100%;
        }

        .action-btn {
            width: 100%;
            max-width: 340px;
            height: 58px;
            border: none;
            border-radius: 14px;
            font-size: 1.15rem;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: all 0.1s ease;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
        }

        .btn-start {
            background: linear-gradient(135deg, #00cb82, #00734a);
            color: #fff;
            border: 1px solid #00ffaa;
        }

        .btn-cashout {
            background: linear-gradient(135deg, #ff9f43, #ff4757);
            color: #fff;
            border: 1px solid #ffbe76;
            animation: pulseBtn 0.8s infinite alternate;
        }

        @keyframes pulseBtn {
            0% { transform: scale(1); box-shadow: 0 0 15px rgba(255, 159, 67, 0.4); }
            100% { transform: scale(1.02); box-shadow: 0 0 25px rgba(255, 71, 87, 0.6); }
        }

        .btn-disabled {
            background: #171d29 !important;
            color: #4b5563 !important;
            cursor: not-allowed;
            animation: none;
            border: none;
            box-shadow: none;
        }
    </style>
</head>
<body>

    <div class="game-canvas">
        <div class="stars"></div>
        <div class="grid" id="grid"></div>
        
        <div class="multiplier-container">
            <div class="multiplier" id="multiplier_display">1.00x</div>
            <div class="status-text" id="game_status">ESPERANDO APUESTA</div>
        </div>

        <div class="rocket-container" id="rocket_container">
            <div class="jet-body">
                <div class="wings"></div>
                <div class="fuselage"></div>
                <div class="cockpit"></div>
                <div class="thruster"></div>
            </div>
            <div class="plasma-flame" id="flame_element"></div>
            <div class="explosion-effect" id="explosion_element"></div>
        </div>
    </div>

    <div class="controls-panel">
        <button class="action-btn btn-start" id="main_btn">DESPEGAR ($1 USDT)</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const mainBtn = document.getElementById('main_btn');
        const multiplierDisplay = document.getElementById('multiplier_display');
        const gameStatus = document.getElementById('game_status');
        const rocketContainer = document.getElementById('rocket_container');
        const flameElement = document.getElementById('flame_element');
        const explosionElement = document.getElementById('explosion_element');
        const grid = document.getElementById('grid');

        let juegoLoop;
        let multiplicador = 1.00;
        let puntoCrashOculto = 1.00;
        let estadoJuego = "menu";

        function actualizarGraficosDespegue() {
            if (estadoJuego !== "volando") return;

            multiplicador += 0.03;
            multiplicador = parseFloat(multiplicador.toFixed(2));
            multiplierDisplay.innerText = multiplicador.toFixed(2) + "x";

            // Vuelo en diagonal fluido adaptado al centro de gravedad del Jet
            let progreso = (multiplicador - 1) * 16; 
            let posX = 15 + progreso;
            let posY = 15 + (Math.pow(progreso, 1.08));

            // Márgenes estrictos para que encaje perfecto en cualquier cel sin cortarse
            if (posX < 78) rocketContainer.style.left = posX + "%";
            if (posY < 68) rocketContainer.style.bottom = posY + "%";

            if (multiplicador >= puntoCrashOculto) {
                hacerCrash();
            }
        }

        function iniciarRondaGrafica() {
            estadoJuego = "volando";
            multiplicador = 1.00;
            puntoCrashOculto = parseFloat((Math.random() * (4.0 - 1.1) + 1.1).toFixed(2));

            gameStatus.innerText = "¡EN ÓRBITA!";
            multiplierDisplay.innerText = "1.00x";
            multiplierDisplay.classList.remove('crash');
            
            // Mostrar componentes de la nave e iniciar fuego de plasma
            rocketContainer.style.display = "block";
            flameElement.style.display = "block";
            explosionElement.style.display = "none";
            document.querySelector('.jet-body').style.display = "block";
            
            rocketContainer.style.left = "15%";
            rocketContainer.style.bottom = "15%";
            grid.style.animationPlayState = "running";

            mainBtn.innerText = "CASHOUT";
            mainBtn.className = "action-btn btn-cashout";

            juegoLoop = setInterval(actualizarGraficosDespegue, 45); 
        }

        function hacerCashout() {
            clearInterval(juegoLoop);
            estadoJuego = "retirado";
            grid.style.animationPlayState = "paused";
            flameElement.style.display = "none";

            gameStatus.innerText = "¡EXTRACCIÓN EXITOSA!";
            mainBtn.innerText = "GANASTE +$" + multiplicador + " USDT";
            mainBtn.className = "action-btn btn-disabled";

            setTimeout(() => {
                tg.close();
            }, 1400);
        }

        function hacerCrash() {
            clearInterval(juegoLoop);
            estadoJuego = "crash";
            grid.style.animationPlayState = "paused";
            
            // Ocultar nave y disparar animación de explosión de plasma
            flameElement.style.display = "none";
            document.querySelector('.jet-body').style.display = "none";
            explosionElement.style.display = "block";
            multiplierDisplay.classList.add('crash');

            gameStatus.innerText = "💥 CRASH";
            mainBtn.innerText = "PERDISTE";
            mainBtn.className = "action-btn btn-disabled";

            setTimeout(() => {
                tg.close();
            }, 1600);
        }

        mainBtn.addEventListener('click', () => {
            if (estadoJuego === "menu") {
                iniciarRondaGrafica();
            } else if (estadoJuego === "volando") {
                hacerCashout();
            }
        });
    </script>
</body>
</html>
